spring.application.name=ClashVerse-Backend

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL DataSource ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5000/clashverse
spring.datasource.username=postgres
spring.datasource.password=9205
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Firebase service account JSON path ───────────────────────────────────────
# Place your serviceAccountKey.json in src/main/resources/ and set the path below
firebase.service-account-path=classpath:serviceAccountKey.json
